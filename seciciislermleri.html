<!DOCTYPE html>
<html>    
    <head>
        
        <title>CSS BAŞKAN</title>
        <style>
            h1{
                color: red;
                font-size: 50px;/*mesela burda h1{} komutu ile komut seçici işlemi yaptık*/
            }
            h1,p{
                color: blue;
                font-size: 30px;/*mesela burda h1,p1 ile{} komutu ile grup seçici işlemi yaptık*/
            }/* "burdaki * ilede tüm kod sayfaları seçilir" */
            #bambaşkan{
                color: green;
                font-size: 20px;/*mesela burda #bambaşkan ile id seçici işlemi yaptık*/
            }
            .Nihal{
                color: orange;
                font-size: 40px;/*mesela burda .Nihal ile class seçici işlemi yaptık*/
            }
            p.kosekoseçiloksit{
                color: purple;
                font-size: 25px;/*mesela burda p.kosekoseçiloksit komut class seçici yaptık*/
            }
            /* href komut metin ayarı yapan seksi bir attirübütestir*/
            /*<a> tıklanabilir link oluşturur*/
                a{
                    color: brown;
                    font-size: 20px;
                }
                /*durum seçici komutları var link bağlantı üzerinde 
                a:link { } /* ziyaret edilmemiş link 
                a:visited { } /* ziyaret edilmiş link 
                a:hover { } /* fare ile üzerine gelindiğinde 
                a:active { } /* tıklanırken */
                a:link{
                    color: brown;
                }
                a:visited{
                    color: gray;
                }
                a:hover{
                    color: red;
                }
                a:active{
                    color: green;
                }
                #kutubaşkan{
                    width: 200px;
                    height: 200px;
                    background-color: black;
                }
                #kutubaşkan:hover{
                    background-color: yellow;
                }/*burda da kutunun üsütne getiritnce renk değişiyor*/
                    #trap::first-letter{
                        color: pink;
                        font-size: 50px;
                    }/*kısmi seçiciler 
                    ::first-letter ilk harf
                    ::first-line ilk satır
                    ::before mesela h1 in önceki tarafına resim koyarsın 
                    ::after mesela h1 in sonuna resim koyarsın 
                    ::marker liste işaretçisi 
                    ::selection seçili metin*/
                #trap::first-line{
                    color: cyan;
                    font-size: 40px;
                }
                input[type="text"]{
                    color: white;
                    background-color: black;
                }/*attribute seçici komutu*/
                input:focus{
                    background-color: gray;
                }/*inputa tıklandığında arka plan rengi değişiyor*/


        </style>
    </head>
    <body>>
        <h1 class="Nihal nunez">CSS BAŞKAN</h1>
        <h2>ZAFER BAŞKAN</h2>
        <p>Başkan Başkan Bambaşkan</p>
        <p id="bambaşkan">Başkan Domalizasyon Bambaşkan</p>
        <p class="kosekoseçiloksit">Başkan Nunez</p>
        <p class="erenay">Başkan Nihal</p>
        <a href="#">Tıklanabilir Link</a>
        <a href="https://www.google.com">Google Linki</a>
        <a href="https://www.youtube.com">Youtube Linki</a>
        <a href="https://www.facebook.com">Facebook Linki</a>
        <div id="kutubaşkan">/*div komutu sayfa düzeni gruplandırmada işe yarar*/
        </div>
        <p id="trap">Ultra paragraf lopez nunez</p>
        <form>
            Ad soyad: <input type="text" name="adsoyad"><br>
        </form>

    </body>
</html>
